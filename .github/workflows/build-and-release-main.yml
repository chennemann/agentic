name: Build And Release On Main

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: build-and-release-main
  cancel-in-progress: false

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Prepare opencode submodule (sparse)
        run: sh script/setup-opencode-submodule.sh

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Compute release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force
          baseline_tag="$(git describe --tags --abbrev=0 --match "v[0-9]*" --exclude "v*.*" 2>/dev/null || true)"
          total_commits="$(git rev-list --count HEAD)"

          if [ -z "${baseline_tag}" ]; then
            commits_since="$(git rev-list --count HEAD)"
            version="v0.${commits_since}"
          else
            if [[ "${baseline_tag}" =~ ^v([0-9]+)$ ]]; then
              major="${BASH_REMATCH[1]}"
            else
              echo "Baseline tag ${baseline_tag} is not in the expected v<major> format." >&2
              exit 1
            fi

            commits_since="$(git rev-list --count "${baseline_tag}..HEAD")"
            version="v${major}.${commits_since}"
          fi

          echo "baseline_tag=${baseline_tag}" >> "${GITHUB_OUTPUT}"
          echo "commits_since=${commits_since}" >> "${GITHUB_OUTPUT}"
          echo "total_commits=${total_commits}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Prepare release signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          if [ -z "${ANDROID_KEYSTORE_BASE64}" ] || [ -z "${ANDROID_KEYSTORE_PASSWORD}" ] || [ -z "${ANDROID_KEY_ALIAS}" ] || [ -z "${ANDROID_KEY_PASSWORD}" ]; then
            echo "Missing Android signing secrets. Configure ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, ANDROID_KEY_PASSWORD." >&2
            exit 1
          fi

          keystore_path="${RUNNER_TEMP}/release.keystore"
          echo "${ANDROID_KEYSTORE_BASE64}" | base64 --decode > "${keystore_path}"

          echo "ANDROID_SIGNING_KEYSTORE_PATH=${keystore_path}" >> "${GITHUB_ENV}"
          echo "ANDROID_SIGNING_KEYSTORE_PASSWORD=${ANDROID_KEYSTORE_PASSWORD}" >> "${GITHUB_ENV}"
          echo "ANDROID_SIGNING_KEY_ALIAS=${ANDROID_KEY_ALIAS}" >> "${GITHUB_ENV}"
          echo "ANDROID_SIGNING_KEY_PASSWORD=${ANDROID_KEY_PASSWORD}" >> "${GITHUB_ENV}"

      - name: Build project
        run: ./gradlew build -PappVersionName=${{ steps.version.outputs.version }} -PappVersionCode=${{ steps.version.outputs.total_commits }}

      - name: Build signed release APK
        run: ./gradlew assembleRelease -PappVersionName=${{ steps.version.outputs.version }} -PappVersionCode=${{ steps.version.outputs.total_commits }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Release ${{ steps.version.outputs.version }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          body: |
            Auto-generated from push to main.
            Baseline tag: ${{ steps.version.outputs.baseline_tag || 'none' }}
            Commits since baseline: ${{ steps.version.outputs.commits_since }}
            Total commits: ${{ steps.version.outputs.total_commits }}
          files: |
            app/build/outputs/apk/release/*.apk
          fail_on_unmatched_files: false
